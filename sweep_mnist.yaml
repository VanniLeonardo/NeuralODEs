program: scripts.train_continuous_mnist # Run as a module
command:
  - ${env}
  - python
  - "-m"
  - ${program}
method: bayes
metric:
  name: test_accuracy
  goal: maximize
parameters:
  lr:
    min: 0.0001
    max: 0.01
  hidden_dim:
    values:[32, 64, 128, 256]
  batch_size:
    values:[64, 128, 256]
  solver:
    values:["dopri5", "rk4", "euler"]
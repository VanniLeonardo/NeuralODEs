program: scripts.train_discrete_mnist

command:
  - ${env}
  - python
  - "-m"
  - ${program}
  - "--use_wandb_sweep"

method: random

metric:
  name: best_test_accuracy
  goal: maximize

parameters:
  lr:
    values: [0.001, 0.0005]

  hidden_dim:
    values: [96, 128, 160]

  num_layers:
    values: [5, 7, 9]

  batch_size:
    values: [64]

  epochs:
    values: [10]
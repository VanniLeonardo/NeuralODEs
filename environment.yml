name: neural_odes
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.11
  
  # ML Framework & CUDA
  - pytorch
  - torchvision
  - pytorch-cuda=12.1
  
  # Data Science & Plotting
  - numpy
  - scikit-learn
  - matplotlib
  - pandas
  
  # DevTools, Linting, & Formatting
  - pytest
  - black
  - ruff
  - mypy
  - rich
  
  # Pip packages
  - pip
  - pip:
    - torchdiffeq
    - wandb